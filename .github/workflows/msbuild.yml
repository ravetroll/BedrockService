name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: BedrockService.slnx

  # Configuration type to build.
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        # .NET 10 (stable). Any 9.0.200+ SDK can build .slnx solutions.
        dotnet-version: '10.0.x'

    - name: Build
      run: dotnet build ${{env.SOLUTION_FILE_PATH}} -c ${{env.BUILD_CONFIGURATION}}

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v7
      with:
        name: BedrockService
        path: BedrockClient/bin/Release/*
        if-no-files-found: error
        retention-days: 0

    # Package the full build output (client + service + deps) into a single zip.
    # BedrockClient references BedrockService, so its output folder contains both exes.
    - name: Package release zip
      if: github.ref == 'refs/heads/master'
      shell: pwsh
      run: Compress-Archive -Path BedrockClient/bin/Release/net472/* -DestinationPath BedrockService.zip -Force

    # Publish/refresh a rolling "latest" release so the README can link to a
    # permanent URL (releases/latest/download/BedrockService.zip) that always
    # serves the newest build.
    - name: Publish latest release
      if: github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: latest
        name: Latest build
        body: Automated build of the latest commit on master.
        files: BedrockService.zip
        make_latest: true
