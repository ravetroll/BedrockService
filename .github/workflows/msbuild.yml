name: MSBuild

on: [push]

permissions:
  contents: write

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: BedrockService.slnx

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # /restore runs the restore target first (PackageReference projects); the
      # .slnx solution format is handled by MSBuild on the runner, unlike older nuget.exe.
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /restore /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: BedrockService # optional, default is artifact
        # A file, directory or wildcard pattern that describes what to upload
        path: BedrockClient/bin/Release/*
        # The desired behavior if no files are found using the provided path.
        #  Available Options:
        #    warn: Output a warning but do not fail the action
        #    error: Fail the action with an error message
        #    ignore: Do not output any warnings or errors, the action does not fail
        if-no-files-found: error # optional, default is warn
        # Duration after which artifact will expire in days. 0 means using default retention.
        # Minimum 1 day. Maximum 90 days unless changed from the repository settings page.
        retention-days: 0 # optional

    # Package the full build output (client + service + deps) into a single zip.
    # BedrockClient references BedrockService, so its output folder contains both exes.
    - name: Package release zip
      if: github.ref == 'refs/heads/master'
      shell: pwsh
      run: Compress-Archive -Path BedrockClient/bin/Release/net472/* -DestinationPath BedrockService.zip -Force

    # Publish/refresh a rolling "latest" release so the README can link to a
    # permanent URL (releases/latest/download/BedrockService.zip) that always
    # serves the newest build.
    - name: Publish latest release
      if: github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest build
        body: Automated build of the latest commit on master.
        files: BedrockService.zip
        make_latest: true
